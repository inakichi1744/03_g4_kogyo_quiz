<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏭 工業クイズ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Sans+JP:wght@400;700;900&display=swap');

:root {
  --primary: #1565c0;
  --primary-light: #42a5f5;
  --primary-dark: #0d47a1;
  --accent: #ff6f00;
  --gold: #f9a825;
  --gold-dark: #c6791a;
  --parchment: #e3f2fd;
  --parchment2: #bbdefb;
  --ink: #0d1b2e;
  --success: #2e7d32;
  --danger: #c62828;
  --shadow: 0 4px 24px rgba(13,71,161,0.18);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: #05111f;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 0 48px;
  color: var(--ink);
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 10% 20%, rgba(21,101,192,0.4) 0%, transparent 55%),
    radial-gradient(ellipse at 90% 80%, rgba(255,111,0,0.15) 0%, transparent 50%),
    repeating-linear-gradient(0deg, transparent, transparent 44px, rgba(66,165,245,0.03) 44px, rgba(66,165,245,0.03) 45px),
    #05111f;
  pointer-events: none;
  z-index: 0;
}

/* ===== HUD ===== */
#hud {
  position: sticky; top: 0; z-index: 100;
  width: 100%; max-width: 540px;
  background: linear-gradient(135deg, #05111f 0%, #0d2240 100%);
  border-bottom: 2px solid var(--primary);
  padding: 10px 16px 8px;
  display: none;
}
.hud-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.hud-level { font-family:'Kaisei Decol',serif; font-size:0.95rem; color:#90caf9; font-weight:700; }
.hud-title-badge { font-size:0.7rem; background:linear-gradient(135deg,var(--primary-dark),var(--primary-light)); color:white; padding:2px 10px; border-radius:999px; font-weight:700; }
.hud-score-chips { display:flex; gap:8px; }
.hud-chip { font-size:0.78rem; font-weight:700; padding:2px 10px; border-radius:999px; }
.hud-chip.ok { background:rgba(46,125,50,0.25); color:#81c784; }
.hud-chip.ng { background:rgba(198,40,40,0.25); color:#ef9a9a; }
.exp-bar-wrap { display:flex; align-items:center; gap:8px; }
.exp-label { font-size:0.7rem; color:#90caf9; white-space:nowrap; }
.exp-bar-bg { flex:1; height:8px; background:rgba(255,255,255,0.1); border-radius:999px; overflow:hidden; }
.exp-bar-fill { height:100%; background:linear-gradient(90deg,var(--primary),var(--primary-light)); border-radius:999px; transition:width 0.6s cubic-bezier(.4,0,.2,1); }

/* ===== レベルアップ ===== */
#levelup-overlay {
  display:none; position:fixed; inset:0; z-index:999;
  background:rgba(5,17,31,0.9);
  align-items:center; justify-content:center; flex-direction:column; text-align:center;
}
#levelup-overlay.show { display:flex; animation:fadeIn 0.3s ease; }
@keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
.levelup-ring {
  width:160px; height:160px; border-radius:50%;
  background:radial-gradient(circle,rgba(66,165,245,0.3) 0%,transparent 70%);
  display:flex; align-items:center; justify-content:center; margin-bottom:20px;
  animation:ringPulse 1s ease-in-out infinite;
}
@keyframes ringPulse { 0%,100%{box-shadow:0 0 0 0 rgba(66,165,245,0.4);}50%{box-shadow:0 0 0 20px rgba(66,165,245,0);} }
.levelup-emoji { font-size:5rem; }
.levelup-text { font-family:'Kaisei Decol',serif; color:#90caf9; font-size:2rem; font-weight:700; text-shadow:0 0 20px rgba(66,165,245,0.8); margin-bottom:8px; }
.levelup-level { font-size:1rem; color:#64b5f6; margin-bottom:12px; }
.levelup-title { font-size:1.1rem; color:#90caf9; background:rgba(66,165,245,0.1); border:1px solid rgba(66,165,245,0.3); padding:8px 24px; border-radius:999px; margin-bottom:24px; }
.btn-levelup-ok { padding:12px 40px; background:linear-gradient(135deg,var(--primary-dark),var(--primary-light)); color:white; border:none; border-radius:6px; font-size:1rem; font-weight:700; cursor:pointer; font-family:'Noto Sans JP',sans-serif; }

/* ===== 称号 ===== */
#title-overlay {
  display:none; position:fixed; inset:0; z-index:998;
  background:rgba(5,17,31,0.92);
  align-items:center; justify-content:center; flex-direction:column; text-align:center; padding:24px;
}
#title-overlay.show { display:flex; animation:fadeIn 0.4s ease; }
.title-scroll { background:var(--parchment); border:3px solid var(--primary); border-radius:8px; padding:32px 28px; max-width:320px; width:100%; }
.title-scroll::before { content:'✦ ✦ ✦'; font-size:0.7rem; color:var(--primary); letter-spacing:6px; display:block; margin-bottom:16px; }
.title-new { font-size:0.75rem; color:var(--danger); font-weight:700; letter-spacing:0.1em; }
.title-main { font-family:'Kaisei Decol',serif; font-size:1.8rem; color:var(--ink); margin:8px 0; }
.title-emoji { font-size:2.5rem; margin:8px 0; }
.title-desc { font-size:0.85rem; color:#1a3a6a; line-height:1.6; margin-top:8px; }
.btn-title-ok { margin-top:20px; padding:10px 32px; background:linear-gradient(135deg,var(--primary-dark),var(--primary-light)); color:white; border:none; border-radius:6px; font-size:0.95rem; font-weight:700; cursor:pointer; font-family:'Noto Sans JP',sans-serif; }

/* ===== INTRO ===== */
#intro-screen { width:100%; display:flex; flex-direction:column; align-items:center; padding:48px 16px 60px; position:relative; z-index:1; }
.intro-emblem { font-size:5rem; margin-bottom:8px; filter:drop-shadow(0 4px 16px rgba(66,165,245,0.5)); animation:float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);} }
.intro-title { font-family:'Kaisei Decol',serif; font-size:1.8rem; color:#90caf9; text-shadow:0 2px 12px rgba(66,165,245,0.4); margin-bottom:4px; text-align:center; }
.intro-sub { color:#64b5f6; font-size:0.85rem; margin-bottom:28px; text-align:center; }
.intro-card { width:100%; max-width:340px; background:var(--parchment); border:2px solid var(--primary); border-radius:8px; padding:20px; margin-bottom:28px; text-align:center; }
.intro-tags { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-bottom:16px; }
.itag { padding:4px 12px; border-radius:999px; font-size:0.78rem; font-weight:700; background:rgba(21,101,192,0.12); color:var(--primary-dark); border:1px solid rgba(21,101,192,0.25); }
.intro-desc { font-size:0.88rem; color:#1a3a6a; line-height:1.8; }
.btn-start { padding:16px 48px; background:linear-gradient(135deg,var(--primary-dark),var(--primary-light)); color:white; border:none; border-radius:8px; font-family:'Kaisei Decol',serif; font-size:1.2rem; font-weight:700; cursor:pointer; box-shadow:0 4px 20px rgba(66,165,245,0.4); transition:all 0.2s; letter-spacing:0.05em; }
.btn-start:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(66,165,245,0.5); }

/* ===== QUIZ ===== */
#quiz-screen { display:none; width:100%; max-width:540px; padding:16px 0 0; position:relative; z-index:1; }
.section-badge { display:inline-block; background:linear-gradient(135deg,var(--primary-dark),var(--primary-light)); color:white; font-size:0.7rem; font-weight:700; padding:3px 14px; border-radius:999px; margin-bottom:8px; letter-spacing:0.05em; }
.q-card { background:var(--parchment); border-radius:6px; padding:28px 20px 20px; box-shadow:var(--shadow), inset 0 0 0 1px rgba(21,101,192,0.18); border-top:3px solid var(--primary); margin:0 16px; animation:cardIn 0.35s cubic-bezier(.4,0,.2,1); }
@keyframes cardIn { from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);} }
.q-meta { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.q-num { font-size:0.75rem; color:#1565c0; }
.q-type-badge { font-size:0.68rem; padding:2px 8px; border-radius:999px; font-weight:700; }
.q-type-badge.choice { background:#fff8e1; color:var(--accent); }
.q-type-badge.text   { background:#e3f2fd; color:var(--primary-dark); }
.q-text { font-family:'Kaisei Decol',serif; font-size:1.05rem; line-height:1.7; color:var(--ink); margin-bottom:18px; }

/* 棒グラフ */
.chart-wrap { background:white; border:2px solid rgba(21,101,192,0.2); border-radius:8px; padding:14px 12px 10px; margin-bottom:14px; }
.chart-title { font-size:0.75rem; color:var(--primary-dark); font-weight:700; margin-bottom:10px; text-align:center; }
.chart-bar-row { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
.chart-bar-label { font-size:0.75rem; color:var(--ink); width:88px; flex-shrink:0; text-align:right; }
.chart-bar-bg { flex:1; height:22px; background:#f0f4f8; border-radius:4px; overflow:hidden; }
.chart-bar-fill { height:100%; border-radius:4px; display:flex; align-items:center; padding-left:6px; font-size:0.7rem; color:white; font-weight:700; white-space:nowrap; transition:width 0.8s cubic-bezier(.4,0,.2,1); }
.chart-bar-pct { font-size:0.75rem; color:var(--primary-dark); font-weight:700; width:42px; flex-shrink:0; }

/* 選択肢 */
.choices { display:flex; flex-direction:column; gap:8px; margin-bottom:12px; }
.choice-btn { width:100%; padding:12px 16px; border:2px solid rgba(21,101,192,0.2); border-radius:6px; background:white; font-size:0.93rem; text-align:left; cursor:pointer; transition:all 0.2s; font-family:'Noto Sans JP',sans-serif; color:var(--ink); position:relative; }
.choice-btn:hover:not(:disabled) { border-color:var(--primary); background:var(--parchment2); transform:translateX(4px); }
.choice-btn.correct  { border-color:var(--success); background:#e8f5e9; color:#1b5e20; font-weight:700; }
.choice-btn.wrong    { border-color:var(--danger);  background:#ffebee; color:#b71c1c; font-weight:700; }
.choice-btn.show-ans { border-color:var(--success); background:#e8f5e9; color:#1b5e20; }
.choice-btn:disabled { cursor:default; }
.c-icon { position:absolute; right:12px; top:50%; transform:translateY(-50%); }

/* テキスト入力 */
.text-input-area { margin-bottom:10px; }
.text-input-area input { width:100%; padding:12px 14px; border:2px solid rgba(21,101,192,0.22); border-radius:6px; font-size:1rem; font-family:'Noto Sans JP',sans-serif; outline:none; background:white; transition:border-color 0.2s; color:var(--ink); }
.text-input-area input:focus { border-color:var(--primary); }
.text-input-area input.correct { border-color:var(--success); background:#e8f5e9; }
.text-input-area input.wrong   { border-color:var(--danger);  background:#ffebee; }

.hint-row { margin:6px 0; }
.hint-btn { display:inline-flex; align-items:center; gap:4px; padding:5px 14px; background:rgba(249,168,37,0.1); border:1.5px dashed var(--gold-dark); border-radius:999px; font-size:0.78rem; color:#a07020; cursor:pointer; font-family:'Noto Sans JP',sans-serif; font-weight:700; transition:background 0.2s; }
.hint-btn:hover { background:rgba(249,168,37,0.2); }
.hint-btn:disabled { opacity:0.5; cursor:default; }
.hint-box { display:none; margin-top:6px; padding:8px 12px; background:rgba(249,168,37,0.08); border-left:3px solid var(--gold-dark); border-radius:4px; font-size:0.8rem; color:#7a5010; }
.hint-box.show { display:block; animation:slideIn 0.2s ease; }

.feedback { display:none; padding:12px 14px; border-radius:6px; margin-bottom:12px; font-size:0.88rem; line-height:1.65; animation:slideIn 0.3s ease; }
@keyframes slideIn { from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);} }
.feedback.correct { background:#e8f5e9; color:#1b5e20; border-left:4px solid var(--success); }
.feedback.wrong   { background:#ffebee; color:#b71c1c; border-left:4px solid var(--danger); }
.feedback.show { display:block; }
.fb-title { font-weight:700; font-size:0.95rem; margin-bottom:4px; }
.fb-exp { font-size:0.8rem; margin-top:4px; }
.fb-explain { font-size:0.83rem; color:#555; margin-top:6px; line-height:1.6; }

.btn { width:100%; padding:13px; border:none; border-radius:6px; font-size:0.95rem; font-weight:700; cursor:pointer; font-family:'Noto Sans JP',sans-serif; transition:all 0.2s; }
.btn-primary { background:linear-gradient(135deg,var(--primary-dark),var(--primary-light)); color:white; box-shadow:0 3px 12px rgba(66,165,245,0.3); }
.btn-primary:hover { transform:translateY(-1px); box-shadow:0 5px 16px rgba(66,165,245,0.4); }
.btn-secondary { background:linear-gradient(135deg,#e65100,var(--accent)); color:white; }
.btn:disabled { opacity:0.6; cursor:default; transform:none !important; }

/* ===== RESULT ===== */
#result-screen { display:none; width:100%; max-width:540px; padding:40px 16px 60px; position:relative; z-index:1; text-align:center; }
.result-emblem { font-size:4rem; margin-bottom:12px; }
.result-title { font-family:'Kaisei Decol',serif; font-size:1.5rem; color:#90caf9; margin-bottom:4px; }
.result-title-display { display:inline-block; background:linear-gradient(135deg,var(--primary-dark),var(--primary-light)); color:white; font-size:0.9rem; font-weight:700; padding:4px 16px; border-radius:999px; margin-bottom:16px; }
.result-card { background:var(--parchment); border:2px solid var(--primary); border-radius:8px; padding:20px; margin-bottom:16px; }
.result-score { font-family:'Kaisei Decol',serif; font-size:3rem; color:var(--ink); font-weight:700; }
.result-score span { font-size:1rem; color:var(--primary); font-weight:400; }
.result-level-row { display:flex; align-items:center; justify-content:center; gap:16px; margin:12px 0; flex-wrap:wrap; }
.rl-item { text-align:center; }
.rl-label { font-size:0.7rem; color:var(--primary); }
.rl-val { font-size:1.2rem; font-weight:700; color:var(--ink); }
.result-msg { font-size:0.9rem; color:#1a3a6a; line-height:1.7; margin:12px 0; }
.result-table { width:100%; border-collapse:collapse; font-size:0.82rem; text-align:left; margin-top:12px; }
.result-table th { background:rgba(21,101,192,0.1); padding:7px 10px; color:#1a3a6a; font-weight:700; }
.result-table td { padding:7px 10px; border-bottom:1px solid rgba(21,101,192,0.1); }
.result-table .ok  { color:var(--success); font-weight:700; }
.result-table .bad { color:var(--danger);  font-weight:700; }
.title-collection { background:var(--parchment); border:2px solid var(--primary); border-radius:8px; padding:16px; margin-bottom:16px; }
.tc-header { font-family:'Kaisei Decol',serif; font-size:1rem; color:var(--ink); margin-bottom:10px; }
.tc-grid { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; }
.tc-badge { padding:4px 12px; border-radius:999px; font-size:0.78rem; font-weight:700; }
.tc-badge.earned { background:linear-gradient(135deg,var(--primary-dark),var(--primary-light)); color:white; }
.tc-badge.locked { background:rgba(21,101,192,0.1); color:#90a4ae; border:1px dashed rgba(21,101,192,0.25); }
.stars { font-size:1.8rem; letter-spacing:4px; margin:8px 0; }
.result-btns { display:flex; flex-direction:column; gap:10px; margin-top:16px; }

/* ===== 称号獲得 派手演出 ===== */
#title-overlay.show .title-scroll{ animation:titlePop .6s cubic-bezier(.34,1.7,.5,1) both, titleGlow2 1.4s .6s ease-in-out infinite; box-shadow:0 0 0 4px rgba(255,215,0,.3),0 14px 50px rgba(0,0,0,.5); }
@keyframes titlePop{0%{transform:scale(.3) rotate(-10deg);opacity:0;}60%{transform:scale(1.08) rotate(3deg);}100%{transform:scale(1) rotate(0);opacity:1;}}
@keyframes titleGlow2{0%,100%{box-shadow:0 0 0 4px rgba(255,215,0,.3),0 14px 50px rgba(0,0,0,.5);}50%{box-shadow:0 0 0 12px rgba(255,215,0,.55),0 14px 64px rgba(255,180,0,.55);}}
#title-overlay.show .title-emoji{ animation:titleEmojiPop .8s ease both; }
@keyframes titleEmojiPop{0%{transform:scale(0) rotate(-180deg);}70%{transform:scale(1.35) rotate(12deg);}100%{transform:scale(1) rotate(0);}}
.tap-hint{ font-size:.7rem; opacity:.55; margin-top:10px; }
.confetti-piece{ position:fixed; top:-12vh; width:10px; height:14px; border-radius:2px; opacity:.95; z-index:1200; pointer-events:none; animation:confettiFall linear forwards; }
@keyframes confettiFall{ to{ transform:translateY(120vh) rotate(720deg); } }
.title-collection{display:none !important;} #title-overlay{display:none !important;}
.intro-tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
.itag{flex:0 1 calc(50% - 3px);box-sizing:border-box;text-align:center;}
.itag-full{flex-basis:100%;}
#qa-popup{display:none;position:fixed;inset:0;z-index:1100;background:rgba(5,17,31,.75);align-items:center;justify-content:center;padding:24px;}
#qa-popup.show{display:flex;}
.qa-popup-box{background:#fff;border:2px solid var(--primary);border-radius:10px;padding:20px 18px;max-width:420px;width:100%;max-height:80vh;overflow:auto;box-shadow:0 12px 40px rgba(0,0,0,.4);}
.qa-popup-text{font-size:0.9rem;color:var(--ink);line-height:1.7;white-space:pre-wrap;word-break:break-word;text-align:left;}
.qa-popup-close{margin-top:16px;width:100%;padding:10px;background:linear-gradient(135deg,var(--primary-dark),var(--primary-light));color:#fff;border:none;border-radius:6px;font-weight:700;cursor:pointer;font-family:inherit;}
.result-table td.q-cell{cursor:pointer;color:var(--primary-dark);text-decoration:underline dotted;}
.exp-col-btn{font-size:0.74rem;padding:3px 10px;border:1.5px solid var(--gold-dark);border-radius:999px;background:#fffde7;color:#a07020;cursor:pointer;font-family:inherit;font-weight:700;white-space:nowrap;}
</style>
</head>
<body>

<!-- レベルアップ -->
<div id="levelup-overlay">
  <div class="levelup-ring"><div class="levelup-emoji">⚙️</div></div>
  <div class="levelup-text">LEVEL UP！</div>
  <div class="levelup-level" id="lu-level">Lv.2 になった！</div>
  <div class="levelup-title" id="lu-title"></div>
  <button class="btn-levelup-ok" onclick="closeLevelup()">よし！続けるぞ ▶</button>
</div>

<!-- 称号 -->
<div id="title-overlay" onclick="closeTitleOverlay()">
  <div class="title-scroll" onclick="event.stopPropagation()">
    <div class="title-new">🎊 称号獲得！</div>
    <div class="title-emoji" id="to-emoji">🏭</div>
    <div class="title-main" id="to-title"></div>
    <div class="title-desc" id="to-desc"></div>
    <button class="btn-title-ok" onclick="closeTitleOverlay()">受け取る！ ✨</button>
    <div class="tap-hint">画面をタップでとじる</div>
  </div>
</div>

<!-- INTRO -->
<div id="intro-screen">
  <div style="height:40px"></div>
  <div class="intro-emblem">🏭</div>
  <div class="intro-title">工業１・２<br>クイズ</div>
  <div class="intro-sub">１２月の演習から出題！</div>
  <div class="intro-card">
    <div class="intro-tags">
      <span class="itag itag-full" id="q-count-tag">🎯 全19問</span>
      <span class="itag">重工業・軽工業</span>
      <span class="itag">太平洋ベルト</span>
      <span class="itag">京浜・中京</span>
      <span class="itag">コンビナート</span>
      <span class="itag">自動車工業</span>
      <span class="itag">出荷額グラフ</span>
    </div>
    <div class="intro-desc">
      経験値を手に入れてレベルアップ！<br>
      めざせ全問正解！
    </div>
  </div>
  <button class="btn-start" onclick="startQuiz()">スタート！ 🚀</button>
</div>

<!-- QUIZ -->
<div id="quiz-screen">
  <div id="hud">
    <div class="hud-top">
      <div class="hud-level" id="hud-level">⚙️ Lv.1 工場見習い</div>
      <div class="hud-score-chips">
        <div class="hud-chip ok">✅ <span id="hud-ok">0</span></div>
        <div class="hud-chip ng">❌ <span id="hud-ng">0</span></div>
      </div>
    </div>
    <div class="exp-bar-wrap">
      <div class="exp-label" id="exp-text">EXP 0/50</div>
      <div class="exp-bar-bg"><div class="exp-bar-fill" id="exp-fill" style="width:0%"></div></div>
      <div class="hud-title-badge" id="hud-title-badge">工場見習い</div>
    </div>
  </div>

  <div style="height:16px"></div>
  <div style="padding:0 16px;margin-bottom:12px;">
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="flex:1;height:6px;background:rgba(255,255,255,0.1);border-radius:999px;overflow:hidden;">
        <div id="prog-fill" style="height:100%;background:linear-gradient(90deg,var(--primary-dark),var(--primary-light));border-radius:999px;transition:width 0.5s;width:0%"></div>
      </div>
      <div style="font-size:0.75rem;color:#90caf9;white-space:nowrap;" id="prog-label">0/20</div>
    </div>
  </div>

  <div class="q-card" id="q-card">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;">

const LEVELS = [
  { lv:1, need:0,   title:'工場見習い',   emoji:'⚙️' },
  { lv:2, need:30,  title:'軽工業職人',   emoji:'🔧' },
  { lv:3, need:80,  title:'重工業の徒',   emoji:'⚒️' },
  { lv:4, need:150, title:'化学工業士',   emoji:'🧪' },
  { lv:5, need:250, title:'工業地帯の星', emoji:'🏗️' },
  { lv:6, need:380, title:'太平洋の覇者', emoji:'🌊' },
  { lv:7, need:550, title:'工業大臣',     emoji:'🏭' },
];

const TITLES = [];

let exp=0, currentLevel=1, earnedTitles=[];

function getLevel(e){ let lv=LEVELS[0]; for(const l of LEVELS){ if(e>=l.need) lv=l; } return lv; }
function addExp(amount){
  const prev=getLevel(exp); exp+=amount; const next=getLevel(exp); updateHUD();
  if(next.lv>prev.lv){ showLevelup(next); return true; } return false;
}
function updateHUD(){
  const lv=getLevel(exp); const nextLv=LEVELS.find(l=>l.lv===lv.lv+1);
  const expInLv=exp-lv.need; const expNeeded=nextLv?nextLv.need-lv.need:999;
  const pct=nextLv?Math.min((expInLv/expNeeded)*100,100):100;
  document.getElementById('hud-level').textContent=`${lv.emoji} Lv.${lv.lv} ${lv.title}`;
  document.getElementById('hud-title-badge').textContent=lv.title;
  document.getElementById('exp-fill').style.width=pct+'%';
  document.getElementById('exp-text').textContent=nextLv?`EXP ${expInLv}/${expNeeded}`:'MAX';
  currentLevel=lv.lv;
}
function showLevelup(lv){
  document.getElementById('lu-level').textContent=`Lv.${lv.lv} になった！`;
  document.getElementById('lu-title').textContent=`${lv.emoji} 称号「${lv.title}」を獲得！`;
  document.getElementById('levelup-overlay').classList.add('show');
}
function closeLevelup(){ document.getElementById('levelup-overlay').classList.remove('show'); }
let titleCallback=null;
function showTitleOverlay(t,cb){
  document.getElementById('to-emoji').textContent=t.emoji;
  document.getElementById('to-title').textContent=t.name;
  document.getElementById('to-desc').textContent=t.desc;
  document.getElementById('title-overlay').classList.add('show');
  spawnConfetti();
  titleCallback=cb||null;
}
function spawnConfetti(){
  const colors=['#ffd700','#ff7043','#42a5f5','#66bb6a','#ab47bc','#ec407a'];
  for(let i=0;i<28;i++){
    const c=document.createElement('div'); c.className='confetti-piece';
    c.style.left=Math.random()*100+'vw';
    c.style.background=colors[i%colors.length];
    c.style.animationDuration=(1.2+Math.random()*1.3)+'s';
    c.style.animationDelay=(Math.random()*0.3)+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),2900);
  }
}
function closeTitleOverlay(){
  document.getElementById('title-overlay').classList.remove('show');
  if(titleCallback){ titleCallback(); titleCallback=null; }
}

// ===== ゲーム状態 =====
let questions=[], currentIndex=0, correctCount=0, wrongCount=0, answered=false, results=[];

function startQuiz(questionSet){
  const isReview=!!questionSet;
  questions=questionSet||[...ALL_QUESTIONS].sort(()=>Math.random()-0.5);
  currentIndex=0; correctCount=0; wrongCount=0; results=[]; answered=false; exp=0;
  if(!isReview) earnedTitles=[];
  document.getElementById('intro-screen').style.display='none';
  document.getElementById('result-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='block';
  document.getElementById('hud').style.display='block';
  updateHUD(); renderQuestion();
  /* 開始時の称号演出は廃止（称号は5割/8割/全問で獲得） */
}

function renderQuestion(){
  const q=questions[currentIndex];
  answered=false;
  const card=document.getElementById('q-card');
  card.style.animation='none'; void card.offsetWidth; card.style.animation='';
  document.getElementById('q-section').textContent=q.section;
  document.getElementById('q-num').textContent=`問${currentIndex+1} / ${questions.length}`;
  document.getElementById('q-text').textContent=q.text;
  document.getElementById('q-image').innerHTML = q.qImg ? '<img src="'+q.qImg+'" alt="" style="max-width:100%;max-height:260px;border-radius:8px;margin:10px auto 0;display:block;border:1px solid rgba(0,0,0,0.15);">' : '';
  const tb=document.getElementById('q-type-badge');
  if(q.type==='choice'||q.type==='chart'){ tb.textContent='選択'; tb.className='q-type-badge choice'; }
  else{ tb.textContent='記述'; tb.className='q-type-badge text'; }
  const fb=document.getElementById('feedback');
  fb.className='feedback'; fb.innerHTML='';
  document.getElementById('next-btn').style.display='none';
  const choicesWrap=document.getElementById('choices-wrap');
  const textWrap=document.getElementById('text-input-wrap');
  const chartArea=document.getElementById('chart-area');
  choicesWrap.innerHTML=''; textWrap.style.display='none'; chartArea.innerHTML='';

  if(q.type==='chart'){
    let html=`<div class="chart-wrap"><div class="chart-title">📊 工業出荷額の割合</div>`;
    q.chartData.forEach(d=>{
      html+=`<div class="chart-bar-row">
        <div class="chart-bar-label">${d.label}</div>
        <div class="chart-bar-bg"><div class="chart-bar-fill" style="width:${d.value}%;background:${d.color};">${d.value}%</div></div>
        <div class="chart-bar-pct">${d.value}%</div>
      </div>`;
    });
    html+=`</div>`;
    chartArea.innerHTML=html;
    // chartのヒントエリアをchartAreaの下に追加
    if(q.hint){
      const hintWrap=document.createElement('div');
      hintWrap.className='hint-row';
      hintWrap.innerHTML=`
        <button class="hint-btn" id="hint-btn-chart" onclick="showHint()">💡 ヒントを見る</button>
        <div class="hint-box" id="hint-box-chart"></div>`;
      chartArea.appendChild(hintWrap);
    }
    renderChoices(q,choicesWrap);
  } else if(q.type==='choice'){
    renderChoices(q,choicesWrap);
  } else {
    textWrap.style.display='block';
    const input=document.getElementById('text-ans');
    input.value=''; input.className=''; input.disabled=false;
    const hintBtn=document.getElementById('hint-btn');
    const hintBox=document.getElementById('hint-box');
    hintBox.textContent=''; hintBox.classList.remove('show');
    if(q.hint){ hintBtn.style.display=''; hintBtn.disabled=false; hintBtn.textContent='💡 ヒントを見る'; }
    else{ hintBtn.style.display='none'; }
    document.getElementById('submit-btn').disabled=false;
    setTimeout(()=>input.focus(),100);
    input.onkeydown=e=>{ if(e.key==='Enter') submitText(); };
  }
  updateProgress();
}

function renderChoices(q,wrap){
  const div=document.createElement('div');
  div.className='choices';
  const list=q.ordered?[...q.choices]:[...q.choices].sort(()=>Math.random()-0.5);
  list.forEach(ch=>{
    const btn=document.createElement('button');
    btn.className='choice-btn'; btn.textContent=ch;
    btn.onclick=()=>selectChoice(btn,ch,q);
    div.appendChild(btn);
  });
  wrap.appendChild(div);
}

function selectChoice(btn,choice,q){
  if(answered) return;
  answered=true;
  const isCorrect=(choice===q.answer);
  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.disabled=true;
    if(b.textContent===q.answer){ b.classList.add('show-ans'); b.innerHTML+=`<span class="c-icon">✅</span>`; }
  });
  if(!isCorrect){ btn.classList.remove('show-ans'); btn.classList.add('wrong'); btn.innerHTML=btn.textContent.replace('<span class="c-icon">✅</span>','')+`<span class="c-icon">❌</span>`; }
  else{ btn.classList.add('correct'); }
  processAnswer(isCorrect,choice,q);
}

function showHint(){
  const q=questions[currentIndex];
  // chart型は専用エリア、それ以外は通常エリア
  const hintBox = q.type==='chart'
    ? document.getElementById('hint-box-chart')
    : document.getElementById('hint-box');
  const hintBtn = q.type==='chart'
    ? document.getElementById('hint-btn-chart')
    : document.getElementById('hint-btn');
  if(!hintBox || !hintBtn) return;
  hintBox.textContent=`💡 ヒント：${q.hint}`; hintBox.classList.add('show');
  hintBtn.disabled=true;
  hintBtn.textContent='💡 ヒントを見た';
}

function submitText(){
  if(answered) return;
  const q=questions[currentIndex];
  const input=document.getElementById('text-ans');
  const userAns=input.value.trim();
  if(!userAns){ input.style.borderColor='orange'; setTimeout(()=>input.style.borderColor='',600); return; }
  answered=true;
  document.getElementById('submit-btn').disabled=true;
  input.disabled=true;
  const norm=s=>s.replace(/\s|　/g,'').replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).replace(/[Ａ-Ｚａ-ｚ]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).toLowerCase();
  const correctList=Array.isArray(q.answers)?q.answers:[q.answer];
  const isCorrect=correctList.some(a=>norm(userAns)===norm(a));
  input.className=isCorrect?'correct':'wrong';
  processAnswer(isCorrect,userAns,q);
}

function processAnswer(isCorrect,userAns,q){
  if(isCorrect){ correctCount++; document.getElementById('hud-ok').textContent=correctCount; }
  else{ wrongCount++; document.getElementById('hud-ng').textContent=wrongCount; }
  results.push({q,isCorrect,userAnswer:userAns});
  const gained=isCorrect?q.exp:Math.floor(q.exp*0.2);
  addExp(gained);
  showFeedback(isCorrect,q,gained);
  document.getElementById('next-btn').style.display='block';
}

function showFeedback(isCorrect,q,gained){
  const fb=document.getElementById('feedback');
  fb.className='feedback '+(isCorrect?'correct':'wrong')+' show';
  const correctList=Array.isArray(q.answers)?q.answers:[q.answer];
  const answerDisp=correctList.join('」または「');
  fb.innerHTML=`
    <div class="fb-title">${isCorrect?'🎉 正解！':`❌ 不正解… 正解は「${answerDisp}」`}</div>
    <div class="fb-exp">${isCorrect?`✨ +${gained} EXP 獲得！`:`💧 +${gained} EXP（参加ポイント）`}</div>
    <div class="fb-explain">📖 ${q.explanation}</div>
  `;
}

function nextQuestion(){
  if(currentIndex+1>=questions.length) showResult();
  else{ currentIndex++; renderQuestion(); }
}

function updateProgress(){
  const pct=(currentIndex/questions.length)*100;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-label').textContent=`${currentIndex}/${questions.length}`;
}

function showResult(){
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('hud').style.display='none';
  document.getElementById('result-screen').style.display='block';
  const total=questions.length; const pct=correctCount/total; const lv=getLevel(exp);
  let emoji,stars,msg;
  if(pct>=1.0)      { emoji='🏆'; stars='⭐⭐⭐'; msg='全問正解！完璧だ！「'+lv.title+'」になった！✨'; }
  else if(pct>=0.8) { emoji='😄'; stars='⭐⭐';   msg='よくできた！あと少しで満点。間違えた問題を確認しよう！'; }
  else if(pct>=0.5) { emoji='😊'; stars='⭐';     msg='がんばった！半分以上正解。復習してもう一度挑戦！'; }
  else              { emoji='💪'; stars='';        msg='まだ覚えていないところがあるね。一つずつ確認しよう！'; }
  document.getElementById('res-emoji').textContent=emoji;
  document.getElementById('res-stars').textContent=stars;
  document.getElementById('res-score').innerHTML=`${correctCount}<span> / ${total}問正解</span>`;
  document.getElementById('res-msg').textContent=msg;
  document.getElementById('res-level').textContent=`Lv.${lv.lv}`;
  document.getElementById('res-exp').textContent=exp;
  document.getElementById('res-pct').textContent=Math.round(pct*100)+'%';

  const newTitles=TITLES.filter(t=>t.id!=='start'&&!earnedTitles.includes(t.id)&&t.cond(results.map(r=>r.isCorrect),correctCount,wrongCount));
  newTitles.forEach(t=>earnedTitles.push(t.id));
  const topTitle=[...TITLES].reverse().find(t=>earnedTitles.includes(t.id));
  document.getElementById('res-title-disp').textContent=`${lv.emoji} ${lv.title}`;

  const grid=document.getElementById('tc-grid');
  grid.innerHTML='';
  TITLES.forEach(t=>{
    const span=document.createElement('span');
    span.className='tc-badge '+(earnedTitles.includes(t.id)?'earned':'locked');
    span.textContent=earnedTitles.includes(t.id)?`${t.emoji} ${t.name}`:'🔒 ???';
    span.title=earnedTitles.includes(t.id)?t.desc:'未獲得';
    grid.appendChild(span);
  });

  const tbody=document.getElementById('res-tbody');
  tbody.innerHTML='';
  results.forEach((r,i)=>{
    const shortQ=r.q.text.length>20?r.q.text.slice(0,20)+'…':r.q.text;
    const correctDisp=Array.isArray(r.q.answers)?r.q.answers[0]:r.q.answer;
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${i+1}</td><td class="q-cell"></td><td class="${r.isCorrect?'ok':'bad'}">${r.isCorrect?'✅ 正解':'❌ '+correctDisp}</td><td class="exp-cell"></td>`;
    const qCell=tr.querySelector('.q-cell');
    qCell.textContent=shortQ;
    qCell.onclick=()=>openQaPopup(r.q.text, r.q.qImg||'');
    if(r.q.explanation){
      const correctList=Array.isArray(r.q.answers)?r.q.answers.join(' / '):r.q.answer;
      const b=document.createElement('button'); b.className='exp-col-btn'; b.textContent='解説';
      b.onclick=()=>openQaPopup('正解：'+correctList+'\n\n'+r.q.explanation, r.q.expImg||'');
      tr.querySelector('.exp-cell').appendChild(b);
    }
    tbody.appendChild(tr);
  });
  document.getElementById('review-btn').style.display=results.some(r=>!r.isCorrect)?'block':'none';
  if(newTitles.length>0){ setTimeout(()=>{ showTitleOverlay(newTitles[newTitles.length-1]); },800); }
}

function toggleExp(btn){
  const expTr=btn._expTr;
  const isShown=expTr.style.display!=='none';
  expTr.style.display=isShown?'none':'table-row';
  btn.textContent=isShown?'💡 解説を見る':'💡 解説を閉じる';
}

function restartQuiz(){
  document.getElementById('result-screen').style.display='none';
  document.getElementById('intro-screen').style.display='flex';
  document.getElementById('intro-screen').style.flexDirection='column';
  document.getElementById('intro-screen').style.alignItems='center';
}

function reviewWrong(){
  const wrong=results.filter(r=>!r.isCorrect).map(r=>r.q);
  if(wrong.length>0) startQuiz(wrong);
}
</script>
<div id="qa-popup" onclick="closeQaPopup()">
  <div class="qa-popup-box" onclick="event.stopPropagation()">
    <div class="qa-popup-text" id="qa-popup-text"></div>
    <button class="qa-popup-close" onclick="closeQaPopup()">✕ 閉じる</button>
  </div>
</div>
<script>
function openQaPopup(t,img){ var b=document.getElementById('qa-popup-text'); b.textContent=t; if(img){ var im=document.createElement('img'); im.src=img; im.style.cssText='width:100%;border-radius:6px;margin-top:10px;'; b.appendChild(im); } document.getElementById('qa-popup').classList.add('show'); }
function closeQaPopup(){ document.getElementById('qa-popup').classList.remove('show'); }
</script>
</body>
</html>
